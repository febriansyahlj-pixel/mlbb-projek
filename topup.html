<!DOCTYPE html>
<html>
<head>
<title>Top Up MLBB Indonesia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'JetBrains Mono',monospace;
color:white;
text-align:center;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 12s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.box{
background:#1e293b;
margin:12px 20px;
padding:16px;
border-radius:14px;
}

.row{
display:flex;
gap:10px;
margin-top:8px;
}

.row input{
padding:10px;
border-radius:8px;
border:none;
width:100%;
}

.diamond{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.diamond button{
padding:14px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-family:'JetBrains Mono',monospace;
cursor:pointer;
}

.selected{
background:#2563eb!important;
}

.btn{
margin-top:12px;
padding:11px 28px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-family:'JetBrains Mono',monospace;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#1e293b;
padding:16px;
border-radius:14px;
width:230px;
position:relative;
}

.popup img{
width:170px;
border-radius:10px;
margin-top:6px;
}

.close{
position:absolute;
top:6px;
right:10px;
font-size:22px;
cursor:pointer;
}

.loading{
font-size:14px;
margin-top:10px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="header">
TOP UP MLBB INDONESIA
</div>

<div class="box">
<p id="region"></p>
</div>

<div class="box">
<p>ID Game</p>

<div class="row">
<input id="id" placeholder="ID">
<input id="server" placeholder="Server">
</div>

</div>

<div class="box">

<p>Pilih Diamond</p>

<div class="diamond">

<button onclick="pilih(this,1000,150000)">1000 💎</button>
<button onclick="pilih(this,2500,220000)">2500 💎</button>
<button onclick="pilih(this,5000,400000)">5000 💎</button>
<button onclick="pilih(this,7000,550000)">7000 💎</button>

<button style="grid-column:1/3"
onclick="pilih(this,10000,1100000)">
10000 💎
</button>

</div>

<p id="harga"></p>

<button class="btn" onclick="bayar()">
Bayar
</button>

</div>


<div class="popup" id="popup">

<div class="popup-box">

<div class="close" onclick="tutup()">✕</div>

<p>Scan QRIS</p>

<img src="qris.png">

<br>

<button class="btn" id="btnBayar" onclick="kirim()">
Sudah Bayar
</button>

<p id="loading" class="loading"></p>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB...",
authDomain: "mlbb-project-f280f.firebaseapp.com",
projectId: "mlbb-project-f280f",
storageBucket: "mlbb-project-f280f.firebasestorage.app",
messagingSenderId: "505986844749",
appId: "1:505986844749:web:c7aebe40556642a9b5f404"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let diamond=0
let harga=0

let region = localStorage.getItem("region") || "Indonesia"

document.getElementById("region").innerHTML="Region : "+region

function rupiah(x){
return "Rp "+x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

function pilih(el,d,h){

diamond=d
harga=h

document.getElementById("harga").innerHTML=rupiah(h)

document.querySelectorAll(".diamond button").forEach(b=>{
b.classList.remove("selected")
})

el.classList.add("selected")

}

function bayar(){

let id=document.getElementById("id").value
let server=document.getElementById("server").value

let angka=/^[0-9]+$/

if(id==""||server==""||!angka.test(id)||!angka.test(server)){
alert("Harap Input ID & Server Yang Benar")
return
}

if(diamond==0){
alert("Pilih diamond dulu")
return
}

document.getElementById("popup").classList.add("show")

}

function tutup(){
document.getElementById("popup").classList.remove("show")
}

let kirimKlik=false

function kirim(){

if(kirimKlik) return
kirimKlik=true

document.getElementById("btnBayar").disabled=true
document.getElementById("loading").innerHTML="Membuat Order..."

let id=document.getElementById("id").value
let server=document.getElementById("server").value

let order="MLBB"+Date.now()

db.collection("orders").doc(order).set({

order:order,
region:region,
id:id,
server:server,
diamond:diamond,
harga:harga,
status:"PENDING",
waktu:new Date()

})

.then(()=>{

window.location.href="order.html?order="+order

})

.catch((error)=>{

alert("Terjadi kesalahan")
console.log(error)

})

}

</script>

</body>
</html>
