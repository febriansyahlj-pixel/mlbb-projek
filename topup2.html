<!DOCTYPE html><html><head>
<title>Top Up MLBB Brazil</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet"><style>

body{
margin:0;
font-family:'JetBrains Mono',monospace;
color:white;
text-align:center;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 12s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.box{
background:#1e293b;
margin:12px 20px;
padding:16px;
border-radius:14px;
}

.row{
display:flex;
gap:10px;
margin-top:8px;
}

.row input{
padding:10px;
border-radius:8px;
border:none;
width:100%;
}

.diamond{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:12px;
}

.diamond button{
padding:16px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-family:'JetBrains Mono',monospace;
cursor:pointer;
transition:0.2s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.diamond button:hover{
transform:translateY(-2px);
background:#475569;
}

.diamond button:active{
transform:scale(0.95);
}

.diamond span{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

.selected{
background:#2563eb!important;
box-shadow:0 0 10px #2563eb;
}

.btn{
margin-top:12px;
padding:11px 28px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-family:'JetBrains Mono',monospace;
cursor:pointer;
}

.footer{
margin-top:30px;
padding:20px;
font-size:12px;
opacity:0.7;
border-top:1px solid #334155;
}

.popup{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#1e293b;
padding:18px 16px 16px 16px;
border-radius:14px;
width:210px;
position:relative;
}

.popup img{
width:140px;
border-radius:10px;
margin-top:6px;
}

.close{
position:absolute;
top:8px;
right:10px;
font-size:18px;
cursor:pointer;
opacity:0.7;
}

.close:hover{
opacity:1;
}

.total-box{
margin-top:10px;
background:#0f172a;
padding:10px;
border-radius:10px;
}

.total-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}

.copy{
background:#2563eb;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.copy:active{
transform:scale(0.9);
}

.loading{
font-size:14px;
margin-top:10px;
opacity:0.8;
}

</style></head><body><div class="header">
TOP UP MLBB BRAZIL
</div><div class="box">
<p id="region"></p>
</div><div class="box"><p>ID Game</p><div class="row">
<input id="id" placeholder="ID">
<input id="server" placeholder="Server">
</div></div><div class="box"><p>Pilih Diamond</p><div class="diamond"><button onclick="pilih(this,172,40585)">172 💎<span>Rp 40.585</span></button>
<button onclick="pilih(this,344,82100)">344 💎<span>Rp 82.100</span></button>
<button onclick="pilih(this,429,102500)">429 💎<span>Rp 102.500</span></button>
<button onclick="pilih(this,706,163500)">706 💎<span>Rp 163.500</span></button>
<button onclick="pilih(this,1050,244500)">1050 💎<span>Rp 244.500</span></button>
<button onclick="pilih(this,2901,646300)">2901 💎<span>Rp 646.300</span></button>
<button onclick="pilih(this,3688,805900)">3688 💎<span>Rp 805.900</span></button>
<button onclick="pilih(this,4394,968800)">4394 💎<span>Rp 968.800</span></button>
<button onclick="pilih(this,5532,1218600)">5532 💎<span>Rp 1.218.600</span></button>
<button onclick="pilih(this,12976,2823300)">12976 💎<span>Rp 2.823.300</span></button>
<button onclick="pilih(this,18576,4045500)">18576 💎<span>Rp 4.045.500</span></button>

<button style="grid-column:1/3" onclick="pilih(this,27864,6112500)">
27864 💎<span>Rp 6.112.500</span>
</button></div><p id="harga"></p><button class="btn" onclick="bayar()">Bayar</button>

</div><div class="footer">
© 2026 EFDESU.MLBB
</div><!-- POPUP QRIS --><div class="popup" id="popup" onclick="outside(event)"><div class="popup-box"><div class="close" onclick="tutup()">✕</div><h3>Scan QRIS</h3><img src="kris.jpg"><div class="total-box"><p>Total Bayar</p><div class="total-row">
<span id="totalHarga">Rp 0</span>
<button class="copy" onclick="copyHarga()">COPY</button>
</div></div><button class="btn" id="btnBayar" onclick="kirim()">
Sudah Bayar
</button><p id="loading" class="loading"></p></div>
</div><!-- POPUP ALERT --><div class="popup" id="alertPopup" onclick="tutupAlert()"><div class="popup-box"><h3 id="alertText">Pesan</h3><button class="btn" onclick="tutupAlert()">
OK
</button></div>
</div><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script>

const firebaseConfig = {
apiKey:"AIzaSyB...",
authDomain:"mlbb-project-f280f.firebaseapp.com",
projectId:"mlbb-project-f280f",
storageBucket:"mlbb-project-f280f.firebasestorage.app",
messagingSenderId:"505986844749",
appId:"1:505986844749:web:c7aebe40556642a9b5f404"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let diamond=0
let harga=0

let region = localStorage.getItem("region") || "Brazil"

document.getElementById("region").innerHTML="Region : "+region

function rupiah(x){
return "Rp "+x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

function showAlert(text){
document.getElementById("alertText").innerText=text
document.getElementById("alertPopup").classList.add("show")
}

function tutupAlert(){
document.getElementById("alertPopup").classList.remove("show")
}

function pilih(el,d,h){

diamond=d
harga=h

document.getElementById("harga").innerHTML="Total : "+rupiah(h)
document.getElementById("totalHarga").innerText=rupiah(h)

document.querySelectorAll(".diamond button").forEach(b=>{
b.classList.remove("selected")
})

el.classList.add("selected")

}

function bayar(){

let id=document.getElementById("id").value
let server=document.getElementById("server").value

let angka=/^[0-9]+$/

if(id==""||server==""||!angka.test(id)||!angka.test(server)){
showAlert("Harap Input ID & Server Yang Benar")
return
}

if(diamond==0){
showAlert("Pilih diamond dulu")
return
}

document.getElementById("popup").classList.add("show")

}

function copyHarga(){
let text=document.getElementById("totalHarga").innerText
navigator.clipboard.writeText(text)
showAlert("Harga disalin: "+text)
}

function tutup(){
document.getElementById("popup").classList.remove("show")
}

function outside(e){
if(e.target.id==="popup"){
tutup()
}
}

let kirimKlik=false

function kirim(){

if(kirimKlik) return
kirimKlik=true

document.getElementById("btnBayar").disabled=true
document.getElementById("loading").innerHTML="Membuat Order..."

let id=document.getElementById("id").value
let server=document.getElementById("server").value

let order="MLBB"+Date.now()

db.collection("orders").doc(order).set({

order:order,
region:region,
id:id,
server:server,
diamond:diamond,
harga:harga,
status:"PENDING",
waktu:new Date()

})

.then(()=>{

let pesan=`🔔 ORDER BARU

Order : ${order}
Region : ${region}
ID : ${id} (${server})
Diamond : ${diamond}
Harga : ${harga}
Status : PENDING

SELESAIKAN:
https://febriansyahlj-pixel.github.io/mlbb-projek/admin.html?done=${order}`

fetch("https://api.telegram.org/bot8715240228:AAFf6DsDe3Njd71FZXkmmZGgVEGe1VFSMTA/sendMessage",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:"7717485230",
text:pesan
})
})

window.location.href="order.html?order="+order

})

}

</script></body>
</html>
