<!DOCTYPE html>
<html>

<head>

<title>Admin Panel MLBB</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'JetBrains Mono',monospace;
color:white;
text-align:center;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 12s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.order{
background:#1e293b;
margin:10px 20px;
padding:15px;
border-radius:12px;
text-align:left;
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-family:'JetBrains Mono',monospace;
margin-right:5px;
}

.pending{
background:#facc15;
color:black;
}

.proses{
background:#3b82f6;
color:white;
}

.selesai{
background:#22c55e;
color:white;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-family:'JetBrains Mono',monospace;
}

</style>

</head>

<body>


<div id="loginBox" style="margin-top:100px">

<h2>Login Admin</h2>

<input id="password" type="password" placeholder="Masukkan Password">

<br><br>

<button onclick="login()">
Login
</button>

</div>


<div id="panel" style="display:none">

<div class="header">
ADMIN PANEL
</div>

<div id="orders"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyBv3hvK1D8Nh9EIA8fdKQuLKtQuiCwehTM",
authDomain: "mlbb-project-f280f.firebaseapp.com",
projectId: "mlbb-project-f280f",
storageBucket: "mlbb-project-f280f.firebasestorage.app",
messagingSenderId: "505986844749",
appId: "1:505986844749:web:c7aebe40556642a9b5f404"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()


function login(){

let pass=document.getElementById("password").value

if(pass==="123aja11"){

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

loadOrders()

}else{

alert("Password salah")

}

}


function loadOrders(){

db.collection("orders")
.orderBy("waktu","desc")
.onSnapshot((snap)=>{

let html=""

snap.forEach(doc=>{

let d=doc.data()

html+=`

<div class="order">

<b>Order :</b> ${d.order}<br>
<b>Region :</b> ${d.region}<br>
<b>ID :</b> ${d.id} (${d.server})<br>
<b>Diamond :</b> ${d.diamond}<br>
<b>Harga :</b> ${d.harga}<br>
<b>Status :</b> ${d.status}<br><br>

<button class="btn pending" onclick="updateStatus('${d.order}','PENDING')">
Pending
</button>

<button class="btn proses" onclick="updateStatus('${d.order}','PROSES')">
Proses
</button>

<button class="btn selesai" onclick="updateStatus('${d.order}','SELESAI')">
Selesai
</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

})

}


function updateStatus(order,status){

db.collection("orders")
.doc(order)
.update({

status:status

})

}

</script>

</body>
</html>
