<!DOCTYPE html><html>
<head><title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet"><style>

body{
margin:0;
font-family:'JetBrains Mono',monospace;
background:#020617;
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:22px;
background:#020617;
}

.container{
width:90%;
max-width:500px;
margin:25px auto;
}

.order{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
text-align:left;
}

.order p{
margin:6px 0;
font-size:13px;
}

.status{
font-weight:bold;
color:#22c55e;
}

.btn{
margin-top:8px;
margin-right:5px;
padding:6px 12px;
border:none;
border-radius:6px;
font-family:'JetBrains Mono',monospace;
cursor:pointer;
}

.pending{
background:#facc15;
}

.proses{
background:#38bdf8;
}

.selesai{
background:#22c55e;
}

</style></head><body><div class="header">
ADMIN PANEL
</div><div class="container" id="orders">
Loading orders...
</div><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script>

const firebaseConfig = {
  apiKey: "AIzaSyBv3hvK1D8Nh9EIA8fdKQuLKtQuiCwehTM",
  authDomain: "mlbb-project-f280f.firebaseapp.com",
  projectId: "mlbb-project-f280f",
  storageBucket: "mlbb-project-f280f.firebasestorage.app",
  messagingSenderId: "505986844749",
  appId: "1:505986844749:web:c7aebe40556642a9b5f404"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadOrders(){

db.collection("orders")
.orderBy("waktu","desc")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let o=doc.data();

html+=`

<div class="order">

<p><b>Order :</b> ${o.order}</p>

<p><b>ID :</b> ${o.id} (${o.server})</p>

<p><b>Diamond :</b> ${o.diamond}</p>

<p><b>Harga :</b> Rp ${o.harga}</p>

<p><b>Status :</b> <span class="status">${o.status}</span></p>

<button class="btn pending" onclick="updateStatus('${o.order}','PENDING')">Pending</button>

<button class="btn proses" onclick="updateStatus('${o.order}','PROSES')">Proses</button>

<button class="btn selesai" onclick="updateStatus('${o.order}','SELESAI')">Selesai</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

})

}

function updateStatus(order,status){

db.collection("orders").doc(order).update({

status:status

})

}

loadOrders()

</script></body>
</html>
